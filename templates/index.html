<!DOCTYPE html>
<html>
<head>
    <title>Expense Tracker</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow-lg">
        <div class="card-header bg-primary text-white">
            <h2>💰 Expense Tracker Dashboard</h2>
        </div>
        <div class="card-body">
            
            <form method="GET" class="row mb-3">

                <div class="col-md-4">
                    <input type="text"
                        name="search"
                        class="form-control"
                        placeholder="Search expense name..."
                        value="{{ search }}">
                </div>

                <div class="col-md-4">
                    <select name="category" class="form-control">
                        <option value="">All Categories</option>
                        <option value="Food" {% if category == 'Food' %}selected{% endif %}>Food</option>
                        <option value="Travel" {% if category == 'Travel' %}selected{% endif %}>Travel</option>
                        <option value="Bills" {% if category == 'Bills' %}selected{% endif %}>Bills</option>
                        <option value="Shopping" {% if category == 'Shopping' %}selected{% endif %}>Shopping</option>
                    </select>
                </div>

                <div class="col-md-4">
                    <button class="btn btn-primary w-100">Search</button>
                </div>

            </form>

            <a href="/add" class="btn btn-success mb-3">
                + Add Expense
            </a>
            <table class="table table-striped table-hover">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Expense Name</th>
                        <th>Amount</th>
                        <th>Action</th>
                    </tr>
                </thead>
                <tbody>
                {% for expense in expenses %}
                    <tr>
                        <td>{{ expense[0] }}</td>
                        <td>{{ expense[1] }}</td>
                        <td>Rs. {{ expense[3] }}</td>
                        <td>
                            <form action="/delete/{{ expense[0] }}"
                                  method="POST">
                                <button
                                class="btn btn-danger btn-sm"
                                onclick="return confirm('Delete this expense?')">
                                Delete
                                </button>
                            </form>
                            <a href="/edit/{{ expense[0] }}"
                            class="btn btn-warning btn-sm">
                                Edit
                            </a>
                        </td>
                    </tr>
                {% endfor %}
                </tbody>
            </table>

            <div class="alert alert-info">
                <h4>Total Spending: Rs. {{ total }}</h4>
            </div>
        </div>
    </div>
</div>

</body>
</html>
