<!DOCTYPE html>
<html>
<head>

    <title>Edit Expense</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-warning text-dark">

            <h2>✏️ Edit Expense</h2>

        </div>

        <div class="card-body">

            <form method="POST">

                <!-- Expense Name -->
                <div class="mb-3">

                    <label class="form-label">Expense Name</label>

                    <input type="text"
                           name="name"
                           class="form-control"
                           value="{{ expense[1] }}"
                           required>

                </div>

                <!-- Category -->
                <div class="mb-3">

                    <label class="form-label">Category</label>

                    <select name="category" class="form-control" required>

                        <option value="Food" {% if expense[2]=='Food' %}selected{% endif %}>Food</option>
                        <option value="Travel" {% if expense[2]=='Travel' %}selected{% endif %}>Travel</option>
                        <option value="Bills" {% if expense[2]=='Bills' %}selected{% endif %}>Bills</option>
                        <option value="Shopping" {% if expense[2]=='Shopping' %}selected{% endif %}>Shopping</option>

                    </select>

                </div>

                <!-- Amount -->
                <div class="mb-3">

                    <label class="form-label">Amount</label>

                    <input type="number"
                           step="0.01"
                           name="amount"
                           class="form-control"
                           value="{{ expense[3] }}"
                           required>

                </div>

                <!-- Buttons -->
                <button type="submit" class="btn btn-warning">
                    Update Expense
                </button>

                <a href="/" class="btn btn-secondary">
                    Cancel
                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
