<!DOCTYPE html>
<html>
<head>

    <title>Add Expense</title>

    <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

    <div class="card shadow-lg">

        <div class="card-header bg-success text-white">

            <h2>Add New Expense</h2>

        </div>

        <div class="card-body">

            <form method="POST">

                <div class="mb-3">

                    <label class="form-label">
                        Expense Name
                    </label>

                    <input
                    type="text"
                    name="name"
                    class="form-control"
                    required>

                </div>

                <div class="mb-3">

                    <label class="form-label">
                        Amount
                    </label>

                    <input
                    type="number"
                    step="0.01"
                    name="amount"
                    class="form-control"
                    required>

                </div>

                <button
                type="submit"
                class="btn btn-success">

                    Add Expense

                </button>

                <a
                href="/"
                class="btn btn-secondary">

                    Back

                </a>

            </form>

        </div>

    </div>

</div>

</body>
</html>
